<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin — La Boutique</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
<style>
  .admin-wrap { max-width: 960px; margin: 0 auto; padding: 40px 20px 80px; }
  .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; }
  .tabs { display: flex; gap: 10px; margin-bottom: 24px; }
  .tab-btn { background: none; border: 1px solid var(--ink); border-radius: 999px; padding: 8px 16px; cursor: pointer; font-family: var(--body); }
  .tab-btn.active { background: var(--ink); color: var(--paper); }
  table { width: 100%; border-collapse: collapse; background: var(--paper); border-radius: var(--radius); overflow: hidden; }
  th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--paper-dim); font-size: 0.9rem; vertical-align: top; }
  th { font-family: var(--mono); font-size: 0.75rem; text-transform: uppercase; color: var(--ink-soft); }
  .login-box { max-width: 340px; margin: 100px auto; background: var(--paper); padding: 28px; border-radius: var(--radius); }
  .login-box input { width: 100%; padding: 10px 12px; margin: 10px 0 16px; border: 1px solid #D8CDB4; border-radius: 6px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; background: var(--paper); padding: 20px; border-radius: var(--radius); margin-bottom: 24px; }
  .form-grid label { grid-column: span 1; font-size: 0.85rem; font-weight: 500; }
  .form-grid label.full { grid-column: span 2; }
  .form-grid input, .form-grid textarea { width: 100%; padding: 8px 10px; margin-top: 4px; border: 1px solid #D8CDB4; border-radius: 6px; font-family: var(--body); }
  .form-grid textarea { min-height: 60px; }
  .row-actions { display: flex; gap: 8px; }
  .badge { font-family: var(--mono); font-size: 0.75rem; padding: 2px 8px; border-radius: 999px; }
  .badge-on { background: #DCEEE1; color: var(--green); }
  .badge-off { background: #F0E4E0; color: var(--red); }
</style>
</head>
<body>

<header class="topbar">
  <div class="wrap topbar-row">
    <a href="/" class="brand">La Boutique<span class="brand-dot">.</span> <small style="font-size:0.6em; color:var(--gold);">admin</small></a>
  </div>
</header>

<div id="login-view" class="admin-wrap">
  <div class="login-box">
    <h3>Connexion admin</h3>
    <label>Mot de passe</label>
    <input type="password" id="f-admin-password" placeholder="Mot de passe admin" />
    <p id="login-error" class="error-text"></p>
    <button id="btn-login" class="btn-primary btn-block">Se connecter</button>
  </div>
</div>

<div id="admin-view" class="admin-wrap hidden">
  <div class="admin-header">
    <h2>Tableau de bord</h2>
    <div id="stats" class="muted"></div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="orders">Commandes</button>
    <button class="tab-btn" data-tab="products">Produits &amp; stock</button>
  </div>

  <!-- Commandes -->
  <section id="tab-orders">
    <table>
      <thead>
        <tr><th>Réf.</th><th>Client</th><th>Contenu</th><th>Total</th><th>Statut</th><th>Transaction</th><th>Actions</th></tr>
      </thead>
      <tbody id="orders-body"></tbody>
    </table>
  </section>

  <!-- Produits -->
  <section id="tab-products" class="hidden">
    <div class="form-grid">
      <label class="full">Titre<input type="text" id="p-title" /></label>
      <label class="full">Description<textarea id="p-desc"></textarea></label>
      <label>Catégorie<input type="text" id="p-category" placeholder="Ebook / Formation" /></label>
      <label>Prix (XAF)<input type="number" id="p-price" /></label>
      <label>Stock (vide = illimité)<input type="number" id="p-stock" /></label>
      <label>Lien du fichier (téléchargement)<input type="text" id="p-fileurl" placeholder="https://..." /></label>
      <label class="full">
        <button id="btn-add-product" class="btn-primary">Ajouter le produit</button>
      </label>
    </div>
    <table>
      <thead>
        <tr><th>Titre</th><th>Catégorie</th><th>Prix</th><th>Stock</th><th>Statut</th><th>Actions</th></tr>
      </thead>
      <tbody id="products-body"></tbody>
    </table>
  </section>
</div>

<script src="js/admin.js"></script>
</body>
</html>
